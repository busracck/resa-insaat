<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Resa İnşaat - Yakında</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: radial-gradient(circle at top, #1a2a33, #0b0f12);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
}

/* Hafif arka glow efekti */
body::before {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: rgba(0, 140, 255, 0.15);
    filter: blur(150px);
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
}

/* Kart */
.container {
    position: relative;
    max-width: 600px;
    padding: 40px 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: fadeIn 1.2s ease;
}

/* Logo */
.logo-img {
    width: 200px;
    margin-bottom: 25px;
    filter: drop-shadow(0 0 20px rgba(255,255,255,0.3));
    transition: 0.4s;
}

.logo-img:hover {
    transform: scale(1.05);
}

/* Başlık */
h1 {
    font-size: 40px;
    margin-bottom: 10px;
    font-weight: 600;
}

/* Açıklama */
p {
    font-size: 17px;
    opacity: 0.8;
}

/* Loader */
.loader {
    margin: 35px auto;
    width: 65px;
    height: 65px;
    border: 6px solid rgba(255,255,255,0.1);
    border-top: 6px solid #00c6ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

/* Alt yazı */
.footer {
    margin-top: 20px;
    font-size: 13px;
    opacity: 0.5;
}

/* Animasyonlar */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

    <img src="img/logo.png" alt="Resa İnşaat" class="logo-img">
    <p>
        Web sitemiz şu anda hazırlanıyor.<br>
        Çok yakında sizlerle buluşacağız.
    </p>

    <div class="loader"></div>

    <div class="footer">
        © 2026 Resa İnşaat
    </div>

</div>

</body>
</html>
